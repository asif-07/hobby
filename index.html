<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator</title>
<style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    label, input { display:block; margin:0.5rem 0; }
</style>
</head>
<body>
<h1>GST Calculator</h1>
<label for="amount">Amount (before GST):</label>
<input type="number" id="amount" step="0.01" placeholder="Enter amount" />
<label for="rate">GST Rate (%):</label>
<input type="number" id="rate" value="10" step="0.01" />
<button id="calculate">Calculate</button>
<h2 id="result"></h2>
<script>
    document.getElementById('calculate').addEventListener('click', function(){
        var amount = parseFloat(document.getElementById('amount').value);
        var rate = parseFloat(document.getElementById('rate').value);
        if (isNaN(amount) || isNaN(rate)) {
            document.getElementById('result').innerText = 'Please enter valid numbers.';
            return;
        }
        var gst = amount * rate / 100;
        var total = amount + gst;
        document.getElementById('result').innerText =
            'GST: ' + gst.toFixed(2) + '\nTotal including GST: ' + total.toFixed(2);
    });
</script>
</body>
</html>
