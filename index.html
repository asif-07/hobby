<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Simple GST calculator supporting inclusive or exclusive amounts">
<title>GST Calculator</title>
<style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    label { display:block; margin:0.5rem 0; }
    input[type="number"] { display:block; margin:0.5rem 0; }
</style>
</head>
<body>
<h1>GST Calculator</h1>
<label for="amount">Amount:</label>
<input type="number" id="amount" step="0.01" placeholder="Enter amount" />
<label for="rate">GST Rate (%):</label>
<input type="number" id="rate" value="10" step="0.01" />
<label>Amount Type:</label>
<label><input type="radio" name="type" value="exclusive" checked>Exclusive (add GST)</label>
<label><input type="radio" name="type" value="inclusive">Inclusive (GST included)</label>
<button id="calculate">Calculate</button>
<h2 id="result"></h2>
<script>
    document.getElementById('calculate').addEventListener('click', function(){
        var amount = parseFloat(document.getElementById('amount').value);
        var rate = parseFloat(document.getElementById('rate').value);
        if (isNaN(amount) || isNaN(rate)) {
            document.getElementById('result').innerText = 'Please enter valid numbers.';
            return;
        }
        var type = document.querySelector('input[name="type"]:checked').value;
        var result = document.getElementById('result');
        var gst, total;

        if (type === 'exclusive') {
            gst = amount * rate / 100;
            total = amount + gst;
            result.innerText =
                'GST: ' + gst.toFixed(2) + '\nTotal including GST: ' + total.toFixed(2);
        } else {
            var base = amount / (1 + rate / 100);
            gst = amount - base;
            result.innerText =
                'GST: ' + gst.toFixed(2) + '\nAmount before GST: ' + base.toFixed(2);
        }
    });
</script>
</body>
</html>
